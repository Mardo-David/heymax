<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratório Estrela · Admin Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1b2a;
      --surface: #142133;
      --surface2: #1a2b3e;
      --border: rgba(255,255,255,0.08);
      --primary: #1976D2;
      --primary-dim: rgba(25,118,210,0.15);
      --teal: #26A69A;
      --teal-dim: rgba(38,166,154,0.12);
      --text: #e1eaf4;
      --muted: #5d7a94;
      --danger: #ef5350;
      --danger-dim: rgba(239,83,80,0.12);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .wrap { max-width: 560px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2.5rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #1976D2, #26A69A);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(25,118,210,0.4);
    }

    .logo-text {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--teal);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    h1 { font-size: 22px; font-weight: 600; margin-bottom: .4rem; }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 6px var(--teal);
      flex-shrink: 0;
    }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .optional {
      font-size: 10px;
      opacity: .6;
      margin-left: 4px;
    }

    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    input:focus, textarea:focus { border-color: var(--primary); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 90px; }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: .75rem;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #1565C0; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

    .btn-danger {
      background: var(--danger-dim);
      color: var(--danger);
      border: 0.5px solid rgba(239,83,80,0.2);
    }
    .btn-danger:hover { background: rgba(239,83,80,0.2); }

    .chat-url-box {
      background: var(--bg);
      border: 0.5px solid rgba(38,166,154,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--teal);
      word-break: break-all;
      display: none;
      margin-top: .5rem;
    }
    .chat-url-box.show { display: block; }
    .url-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .url-text { flex: 1; }
    .btn-copy-inline {
      padding: 4px 10px;
      border-radius: 6px;
      border: 0.5px solid rgba(38,166,154,0.4);
      background: var(--teal-dim);
      color: var(--teal);
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-chat-inline {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      border: 0.5px solid rgba(25,118,210,0.4);
      background: var(--primary-dim);
      color: var(--primary);
      font-size: 11px;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 13px;
      transition: transform .3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(38,166,154,.3); color: var(--teal); }
    .toast.error { border-color: rgba(239,83,80,.3); color: var(--danger); }

    .demo-item {
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: .75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .demo-info { flex: 1; min-width: 0; }
    .demo-name { font-size: 14px; font-weight: 500; }
    .demo-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .demo-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    .demo-ttl {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--teal);
      background: var(--teal-dim);
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .btn-sm-copy {
      padding: 5px 8px;
      border-radius: 7px;
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
    }
    .btn-sm-copy:hover { color: var(--text); }

    .btn-sm-open {
      padding: 5px 10px;
      border-radius: 7px;
      border: 0.5px solid rgba(25,118,210,0.4);
      background: var(--primary-dim);
      color: var(--primary);
      font-size: 11px;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-sm-open:hover { background: rgba(25,118,210,.25); }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 2rem 0;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="header">
      <div class="logo-icon">★</div>
      <div>
        <div class="logo-text">Laboratório Estrela</div>
        <div class="logo-sub">Admin · Demo Stella</div>
      </div>
    </div>

    <h1>Nova demonstração</h1>
    <p class="subtitle">Preencha antes da reunião. O link do chat é gerado automaticamente.</p>

    <div class="card">
      <div class="card-title">Dados do prospect</div>

      <div class="field">
        <label>Nome do prospect</label>
        <input id="prospect_nome" type="text" placeholder="ex: Dr. Marcos Lima">
      </div>
      <div class="field">
        <label>Contexto <span class="optional">(background da reunião)</span></label>
        <textarea id="contexto" placeholder="ex: Gestor de clínica em Serrinha, interesse em triagem laboratorial para convênio Unimed..."></textarea>
      </div>
      <div class="field">
        <label>Motivo do contato simulado</label>
        <input id="motivo" type="text" placeholder="ex: agendar exames de rotina com plano de saúde">
      </div>
      <div class="field">
        <label>WhatsApp do prospect <span class="optional">(DDD + número — obrigatório para bot responder)</span></label>
        <input id="telefone_demo" type="text" placeholder="ex: 75999999999">
      </div>

      <button class="btn btn-primary" id="btn-criar" onclick="criarDemo()">
        Criar sessão e gerar link do chat
      </button>

      <div class="chat-url-box" id="chat-url-box">
        <div class="url-row">
          <span class="url-text" id="chat-url-text"></span>
          <button class="btn-copy-inline" onclick="copiarUrl()">Copiar</button>
          <a class="btn-chat-inline" id="chat-url-link" href="#" target="_blank">Abrir →</a>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Reset de sessão</div>
      <div class="field">
        <input id="reset_id" type="text" placeholder="demo_id (ex: estrela-dr-marcos-abc123)">
      </div>
      <button class="btn btn-danger" onclick="resetDemo()">Apagar sessão e histórico</button>
    </div>

    <div class="card">
      <div class="card-title">Sessões ativas</div>
      <div id="demos-list"><div class="empty">Carregando...</div></div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    let lastChatUrl = '';

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    function ttlLabel(expiresAt) {
      const diff = new Date(expiresAt) - new Date();
      if (diff <= 0) return 'expirada';
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      return h > 0 ? `${h}h ${m}m` : `${m}min`;
    }

    function copiarUrl() {
      if (!lastChatUrl) return;
      navigator.clipboard.writeText(lastChatUrl).then(() => showToast('✓ Link copiado!'));
    }

    async function carregarDemos() {
      try {
        const res = await fetch('/demo/estrela/admin/list');
        const demos = await res.json();
        const el = document.getElementById('demos-list');
        if (!demos.length) {
          el.innerHTML = '<div class="empty">Nenhuma sessão ativa</div>';
          return;
        }
        el.innerHTML = demos.map(d => {
          const chatUrl = `/demo/estrela/chat/${d.demo_id}`;
          const fullUrl = location.origin + chatUrl;
          return `
            <div class="demo-item">
              <div class="demo-info">
                <div class="demo-name">${d.contact_name}</div>
                <div class="demo-meta">${d.contact_goal}</div>
              </div>
              <div class="demo-actions">
                <span class="demo-ttl">${ttlLabel(d.expires_at)}</span>
                <button class="btn-sm-copy" title="Copiar link" onclick="navigator.clipboard.writeText('${fullUrl}').then(()=>showToast('✓ Link copiado!'))">📋</button>
                <a class="btn-sm-open" href="${chatUrl}" target="_blank">Abrir →</a>
              </div>
            </div>
          `;
        }).join('');
      } catch (e) {
        document.getElementById('demos-list').innerHTML = '<div class="empty">Erro ao carregar</div>';
      }
    }

    async function criarDemo() {
      const btn = document.getElementById('btn-criar');
      const body = {
        prospect_nome: document.getElementById('prospect_nome').value.trim(),
        contexto: document.getElementById('contexto').value.trim(),
        motivo: document.getElementById('motivo').value.trim(),
        telefone_demo: document.getElementById('telefone_demo').value.trim() || null,
      };

      if (!body.prospect_nome || !body.contexto || !body.motivo) {
        showToast('Preencha nome, contexto e motivo', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Criando...';

      try {
        const res = await fetch('/demo/estrela/admin/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Erro');

        lastChatUrl = location.origin + data.chat_url;
        document.getElementById('chat-url-text').textContent = lastChatUrl;
        document.getElementById('chat-url-link').href = data.chat_url;
        document.getElementById('chat-url-box').classList.add('show');

        showToast('✓ Sessão criada! Link gerado.');
        navigator.clipboard.writeText(lastChatUrl).catch(() => {});

        ['prospect_nome', 'contexto', 'motivo', 'telefone_demo'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = '';
        });
        carregarDemos();
      } catch (e) {
        showToast(e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Criar sessão e gerar link do chat';
      }
    }

    async function resetDemo() {
      const demoId = document.getElementById('reset_id').value.trim();
      if (!demoId) { showToast('Informe o demo_id', 'error'); return; }
      if (!confirm(`Apagar a sessão "${demoId}"?`)) return;
      try {
        const res = await fetch('/demo/estrela/admin/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ demo_id: demoId }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Erro');
        showToast('✓ Sessão apagada');
        document.getElementById('reset_id').value = '';
        carregarDemos();
      } catch (e) {
        showToast(e.message, 'error');
      }
    }

    carregarDemos();
    setInterval(carregarDemos, 30000);
  </script>
</body>

</html>
