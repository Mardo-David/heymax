<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratório Estrela · Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: #e8f0f7;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1565C0 0%, #1976D2 100%);
      padding: 0 1.25rem;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(21,101,192,0.35);
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-info { flex: 1; }

    .header-name {
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
    }

    .header-status {
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #69F0AE;
      box-shadow: 0 0 5px #69F0AE;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }

    .header-logo {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      text-align: right;
    }

    /* ── Messages Area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: .625rem;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(21,101,192,0.2); border-radius: 4px; }

    /* ── Date separator ── */
    .date-sep {
      text-align: center;
      font-size: 11px;
      color: #6b7c93;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      border-radius: 12px;
      padding: 3px 12px;
      margin: .25rem auto .5rem;
      user-select: none;
    }

    /* ── Bubble wrap ── */
    .bubble-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 78%;
      animation: fadeSlide .2s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble-wrap.assistant { margin-right: auto; }
    .bubble-wrap.user { margin-left: auto; flex-direction: row-reverse; }

    /* ── Avatar (Stella only) ── */
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Bubble ── */
    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-width: 100%;
    }

    .bubble.assistant {
      background: #ffffff;
      color: #1a2332;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .bubble.user {
      background: #1565C0;
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 1px 6px rgba(21,101,192,0.35);
    }

    /* ── Typing indicator ── */
    .typing-wrap {
      display: none;
      align-items: flex-end;
      gap: 8px;
      max-width: 78%;
      margin-right: auto;
    }
    .typing-wrap.show { display: flex; animation: fadeSlide .2s ease; }

    .typing-bubble {
      background: #ffffff;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00897B;
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .6; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Expired banner ── */
    .expired-banner {
      background: rgba(239,83,80,0.1);
      border-top: 1px solid rgba(239,83,80,0.2);
      color: #ef5350;
      text-align: center;
      padding: .75rem;
      font-size: 13px;
      flex-shrink: 0;
      display: none;
    }
    .expired-banner.show { display: block; }

    /* ── Input area ── */
    .input-area {
      background: #fff;
      border-top: 1px solid #dee5ed;
      padding: .875rem 1rem;
      display: flex;
      align-items: flex-end;
      gap: .75rem;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: #f0f4f8;
      border: 1.5px solid #dee5ed;
      border-radius: 22px;
      padding: 10px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #1a2332;
      outline: none;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color .2s;
    }

    #input:focus { border-color: #1565C0; background: #fff; }
    #input::placeholder { color: #6b7c93; }
    #input:disabled { opacity: .5; }

    .btn-send {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: #00897B;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all .2s;
      box-shadow: 0 2px 8px rgba(0,137,123,0.4);
    }

    .btn-send:hover { background: #00796B; transform: scale(1.05); }
    .btn-send:active { transform: scale(.96); }
    .btn-send:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-send svg { width: 20px; height: 20px; }

    /* ── Error toast ── */
    .err-msg {
      background: rgba(239,83,80,0.12);
      color: #ef5350;
      font-size: 12px;
      text-align: center;
      padding: 6px 1rem;
      flex-shrink: 0;
      display: none;
    }
    .err-msg.show { display: block; }

    .err-msg.show { display: block; }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="header-avatar">
      <img src="/demo/estrela/avatar" alt="Stella">
    </div>
    <div class="header-info">
      <div class="header-name">Stella</div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span>Laboratório Estrela · Online</span>
      </div>
    </div>
    <div class="header-logo">★ Estrela</div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="date-sep">Hoje</div>
  </div>

  <!-- Typing indicator -->
  <div class="typing-wrap" id="typing">
    <div class="avatar">
      <img src="/demo/estrela/avatar" alt="Stella">
    </div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <!-- Expired banner -->
  <div class="expired-banner" id="expired-banner">
    ⏱ Esta sessão de demonstração expirou.
  </div>

  <!-- Error -->
  <div class="err-msg" id="err-msg"></div>

  <!-- Input -->
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Digite uma mensagem..." maxlength="1000"></textarea>
    <button class="btn-send" id="btn-send" onclick="sendMessage()" title="Enviar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <script>
    const DEMO_ID = '__DEMO_ID__';
    let lastCount = 0;
    let isSending = false;
    let isExpired = false;

    // ── Auto-grow textarea ──────────────────────────────────────────────────
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    // Enter envia imediatamente
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ── Helpers ─────────────────────────────────────────────────────────────

    function showTyping(show) {
      document.getElementById('typing').classList.toggle('show', show);
      scrollBottom();
    }

    function scrollBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showError(msg) {
      const el = document.getElementById('err-msg');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    function setExpired() {
      isExpired = true;
      document.getElementById('expired-banner').classList.add('show');
      input.disabled = true;
      document.getElementById('btn-send').disabled = true;
    }

    // ── Render messages ─────────────────────────────────────────────────────
    function renderMessages(messages) {
      const container = document.getElementById('messages');
      container.innerHTML = '<div class="date-sep">Hoje</div>';

      messages.forEach(m => {
        const wrap = document.createElement('div');
        wrap.className = `bubble-wrap ${m.role}`;

        if (m.role === 'assistant') {
          const av = document.createElement('div');
          av.className = 'avatar';
          const img = document.createElement('img');
          img.src = '/demo/estrela/avatar';
          img.alt = 'Stella';
          av.appendChild(img);
          wrap.appendChild(av);
        }

        const bubble = document.createElement('div');
        bubble.className = `bubble ${m.role}`;
        bubble.textContent = m.content;
        wrap.appendChild(bubble);
        container.appendChild(wrap);
      });

      scrollBottom();
    }

    // ── Polling ─────────────────────────────────────────────────────────────
    async function pollHistory() {
      if (isSending || isExpired) return;
      try {
        const res = await fetch(`/demo/estrela/chat/${DEMO_ID}/history`);
        if (res.status === 404) { setExpired(); return; }
        if (!res.ok) return;
        const data = await res.json();
        if (data.expired) { setExpired(); return; }
        if (data.messages.length !== lastCount) {
          lastCount = data.messages.length;
          renderMessages(data.messages);
        }
      } catch (e) { /* silent fail */ }
    }

    // ── Send ─────────────────────────────────────────────────────────────────
    async function sendMessage() {
      const message = input.value.trim();
      if (!message || isSending || isExpired) return;

      isSending = true;
      input.value = '';
      input.style.height = 'auto';
      input.disabled = true;
      document.getElementById('btn-send').disabled = true;

      // Bolha otimista do usuário
      const container = document.getElementById('messages');
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap user';
      const bubble = document.createElement('div');
      bubble.className = 'bubble user';
      bubble.textContent = message;
      wrap.appendChild(bubble);
      container.appendChild(wrap);
      lastCount++;
      scrollBottom();

      showTyping(true);

      try {
        const res = await fetch(`/demo/estrela/chat/${DEMO_ID}/send`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });

        showTyping(false);

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          if (res.status === 404) { setExpired(); return; }
          throw new Error(err.detail || 'Erro ao enviar');
        }

        const data = await res.json();

        const respWrap = document.createElement('div');
        respWrap.className = 'bubble-wrap assistant';
        const av = document.createElement('div');
        av.className = 'avatar';
        const img = document.createElement('img');
        img.src = '/demo/estrela/avatar';
        img.alt = 'Stella';
        av.appendChild(img);
        const respBubble = document.createElement('div');
        respBubble.className = 'bubble assistant';
        respBubble.textContent = data.response;
        respWrap.appendChild(av);
        respWrap.appendChild(respBubble);
        container.appendChild(respWrap);
        lastCount++;
        scrollBottom();

      } catch (e) {
        showTyping(false);
        showError(e.message || 'Erro ao enviar. Tente novamente.');
      } finally {
        isSending = false;
        if (!isExpired) {
          input.disabled = false;
          document.getElementById('btn-send').disabled = false;
          input.focus();
        }
      }
    }

    // ── Start ────────────────────────────────────────────────────────────────
    pollHistory();
    setInterval(pollHistory, 1000);
    input.focus();
  </script>

</body>
</html>
